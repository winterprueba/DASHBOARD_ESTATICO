<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tablero LISA GeoJSON v1.2.4</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQwCOQ0hLMPK9ePhQhMD7FJcZjWg5nY="
      crossorigin=""
    />
    <link rel="stylesheet" href="css/style.css?v=1.2.4" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Correlacion espacial</p>
        <h1>Tablero interactivo LISA v1.2.4</h1>
      </div>
      <div class="status" id="status">Listo</div>
    </header>

    <main class="layout">
      <aside class="panel">
        <section class="control-group">
          <label for="collectionSelect">Coleccion</label>
          <select id="collectionSelect"></select>
        </section>

        <section class="control-group">
          <label for="analysisSelect">Tipo de analisis</label>
          <select id="analysisSelect"></select>
        </section>

        <section class="control-group">
          <label for="citySelect">Ciudad</label>
          <select id="citySelect"></select>
        </section>

        <section class="control-group">
          <label for="indicatorSelect">Indicador</label>
          <select id="indicatorSelect"></select>
        </section>

        <section class="control-group">
          <label for="colorMode">Color del mapa</label>
          <select id="colorMode">
            <option value="auto">Color recomendado</option>
            <option value="cluster">Cluster LISA</option>
            <option value="quadrant">Cuadrante</option>
            <option value="numeric">Variable numerica</option>
          </select>
        </section>

        <section class="control-group" id="numericGroup">
          <label for="numericField">Variable numerica</label>
          <select id="numericField"></select>
        </section>

        <section class="control-group" id="categoryGroup">
          <label for="categoryField">Campo de categoria</label>
          <select id="categoryField"></select>
        </section>

        <section class="control-group" id="categoryValueGroup">
          <label for="categoryValue">Filtrar categoria</label>
          <select id="categoryValue"></select>
        </section>

        <section class="control-row" id="significanceGroup">
          <input id="significantOnly" type="checkbox" />
          <label for="significantOnly">Solo significativos</label>
        </section>

        <section class="control-group" id="pValueGroup">
          <label for="pValueMax">p-value maximo</label>
          <input id="pValueMax" type="number" min="0.001" max="1" step="0.001" value="0.05" />
        </section>

        <section class="metrics">
          <article>
            <span>Poligonos</span>
            <strong id="featureCount">0</strong>
          </article>
          <article>
            <span>Archivo</span>
            <strong id="fileName">-</strong>
          </article>
        </section>

        <section>
          <h2>Distribucion</h2>
          <div id="distribution" class="distribution"></div>
        </section>

        <a id="downloadLink" class="download" href="#" download>Descargar GeoJSON visible</a>
      </aside>

      <section class="map-area">
        <div id="map"></div>
      </section>
    </main>

    <section class="table-section">
      <div class="table-heading">
        <h2>Tabla de atributos</h2>
        <span id="tableNote">Primeros 250 registros visibles</span>
      </div>
      <div class="table-wrap">
        <table id="attributeTable"></table>
      </div>
    </section>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="js/map.js?v=1.2.4"></script>
  </body>
</html>
